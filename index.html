<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini AI Assistant</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0f172a;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.chat-container{
  width:420px;
  height:680px;
  background:#111827;
  border-radius:20px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.header{
  background:#1e293b;
  color:white;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.chat-box{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.message{
  max-width:80%;
  padding:12px 15px;
  border-radius:15px;
  word-wrap:break-word;
}

.user{
  background:#2563eb;
  color:white;
  align-self:flex-end;
}

.bot{
  background:#374151;
  color:white;
  align-self:flex-start;
}

.typing{
  opacity:0.7;
  font-style:italic;
}

.input-area{
  display:flex;
  padding:15px;
  background:#1e293b;
}

input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  border-radius:10px;
  background:#374151;
  color:white;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
button:hover{ background:#1d4ed8; }
</style>
</head>

<body>

<div class="chat-container">

  <div class="header">Mini AI Assistant</div>

  <div class="chat-box" id="chatBox">
    <div class="message bot">
      Hello 👋 I am your AI assistant. Ask me anything.
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask anything...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>

const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");

/* ========================= */
/* 🔑 PASTE YOUR API KEY HERE */
/* ========================= */
const API_KEY = "AIzaSyAfuT_gfp-puAny7UrhwDNSPv3kJSTVSW0";

/* ========================= */
/* 💬 UI FUNCTIONS */
/* ========================= */

function addMessage(text, sender){
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping(){
  const typing = document.createElement("div");
  typing.classList.add("message", "bot", "typing");
  typing.id = "typing";
  typing.innerText = "AI is thinking...";
  chatBox.appendChild(typing);
}

function removeTyping(){
  const t = document.getElementById("typing");
  if(t) t.remove();
}

/* ========================= */
/* 🤖 GEMINI AI FUNCTION (FIXED) */
/* ========================= */

async function getAIResponse(userMessage){

  try{

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                {
                  text: userMessage
                }
              ]
            }
          ]
        })
      }
    );

    const data = await response.json();

    console.log("DEBUG RESPONSE:", data);

    if(data.error){
      return "API Error: " + data.error.message;
    }

    if(!data.candidates || !data.candidates.length){
      return "No response from AI. Check API key or model access.";
    }

    return data.candidates[0].content.parts[0].text;

  } catch (error){
    console.log(error);
    return "Network error. Check internet or API key.";
  }
}

/* ========================= */
/* 🚀 SEND MESSAGE */
/* ========================= */

async function sendMessage(){

  const text = userInput.value.trim();
  if(text === "") return;

  addMessage(text, "user");
  userInput.value = "";

  showTyping();

  const reply = await getAIResponse(text);

  removeTyping();
  addMessage(reply, "bot");
}

userInput.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendMessage();
  }
});

</script>

</body>
</html>
